---
- name: Setup gaming environment
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    gaming_flatpaks:
      - com.discordapp.Discord
      - com.heroicgameslauncher.hgl

  tasks:
    - name: Skip in containers
      when: >
        ansible_facts.get('virtualization_type', '') == 'container' or
        ansible_facts.get('file', {}).get('/run/.toolboxenv', {}).get('exists', false)
      block:
        - name: Skip message
          ansible.builtin.debug:
            msg: "Skipping gaming setup in container environment"
        - name: End play
          ansible.builtin.meta: end_play

    - name: Add Flathub remote
      ansible.builtin.shell: |
        flatpak remote-add --if-not-exists flathub "https://dl.flathub.org/repo/flathub.flatpakrepo"
      register: remote_result
      changed_when: remote_result.rc == 0
      failed_when: false

    - name: Install gaming Flatpak applications
      ansible.builtin.shell: |
        flatpak install -y flathub {{ item }}
      loop: "{{ gaming_flatpaks }}"
      loop_control:
        label: "{{ item }}"
      register: gaming_install
      changed_when: gaming_install.rc == 0
      failed_when: false

    - name: Reset Flatpak overrides for gaming apps
      ansible.builtin.shell: flatpak override --user --reset {{ item }}
      loop: "{{ gaming_flatpaks }}"
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Apply Discord override
      ansible.builtin.shell: >
        flatpak override --user com.discordapp.Discord
        --share=ipc
        --socket=fallback-x11
        --socket=wayland
        --socket=pulseaudio
        --device=dri
        --talk-name=org.kde.StatusNotifierWatcher
        --env=GTK_USE_PORTAL=1

    - name: Apply Heroic Games Launcher override
      ansible.builtin.shell: >
        flatpak override --user com.heroicgameslauncher.hgl
        --share=ipc
        --socket=fallback-x11
        --socket=wayland
        --socket=pulseaudio
        --device=dri
        --filesystem=home
        --filesystem=/run/media:ro
        --filesystem=/mnt:ro
        --env=GTK_USE_PORTAL=1
