---
- name: Setup gaming environment
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    gaming_nix_packages:
      - discord
      - heroic

  tasks:
    - name: Skip in containers
      when: >
        ansible_facts.get('virtualization_type', '') == 'container' or
        ansible_facts.get('file', {}).get('/run/.toolboxenv', {}).get('exists', false)
      block:
        - name: Skip message
          ansible.builtin.debug:
            msg: "Skipping gaming setup in container environment"
        - name: End play
          ansible.builtin.meta: end_play

    - name: Check which Nix packages are installed
      ansible.builtin.shell: |
        /var/home/{{ ansible_user_id }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ ansible_user_id }}/.nix /home/{{ ansible_user_id }}/.nix-profile/bin/nix profile list 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g' | grep "^Name:" | awk '{print $2}' || true
      become: true
      become_user: "{{ ansible_user_id }}"
      args:
        executable: /bin/bash
      register: nix_installed_list
      changed_when: false
      failed_when: false

    - name: Install gaming Nix packages
      ansible.builtin.shell: |
        set -euo pipefail
        NIXPKGS_ALLOW_UNFREE=1 /var/home/{{ ansible_user_id }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ ansible_user_id }}/.nix /home/{{ ansible_user_id }}/.nix-profile/bin/nix profile add --impure nixpkgs#{{ item }}
      become: true
      become_user: "{{ ansible_user_id }}"
      args:
        executable: /bin/bash
      environment:
        NIXPKGS_ALLOW_UNFREE: "1"
      loop: "{{ gaming_nix_packages }}"
      loop_control:
        label: "{{ item }}"
      register: gaming_install
      changed_when: gaming_install.rc == 0
      failed_when: false
      when: item not in (nix_installed_list.stdout_lines | default([]))
