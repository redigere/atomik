---
- name: Install non-system Flatpak applications
  hosts: localhost
  become: true
  gather_facts: true

  tasks:
    - name: Skip in containers
      when: >
        ansible_facts.get('virtualization_type', '') == 'container' or
        ansible_facts.get('file', {}).get('/run/.toolboxenv', {}).get('exists', false)
      block:
        - name: Skip message
          ansible.builtin.debug:
            msg: "Skipping package management in container environment"
        - name: End play
          ansible.builtin.meta: end_play

    - name: Add Flathub remote
      ansible.builtin.shell: |
        flatpak remote-add --if-not-exists flathub "https://dl.flathub.org/repo/flathub.flatpakrepo"
      register: remote_result
      changed_when: remote_result.rc == 0
      failed_when: false

    - name: Install non-system Flatpak applications
      ansible.builtin.shell: |
        flatpak install -y flathub {{ item }}
      loop:
        - com.discordapp.Discord
        - com.slack.Slack
        - com.jetbrains.IntelliJ-IDEA-Ultimate
        - com.jetbrains.PyCharm-Professional
        - com.jetbrains.GoLand
        - com.jetbrains.WebStorm
        - com.google.AndroidStudio
      loop_control:
        label: "{{ item }}"
      register: flatpak_install_result
      changed_when: flatpak_install_result.rc == 0
      failed_when: false

    - name: Reset Flatpak overrides
      ansible.builtin.shell: flatpak override --user --reset {{ item }}
      loop:
        - com.discordapp.Discord
        - com.jetbrains.IntelliJ-IDEA-Ultimate
        - com.jetbrains.PyCharm-Professional
        - com.jetbrains.GoLand
        - com.jetbrains.WebStorm
        - com.google.AndroidStudio
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Apply Discord override
      ansible.builtin.shell: flatpak override --user com.discordapp.Discord --share=ipc --socket=fallback-x11 --socket=wayland --socket=pulseaudio --device=dri --talk-name=org.kde.StatusNotifierWatcher --env=GTK_USE_PORTAL=1

    - name: Apply IDE overrides
      ansible.builtin.shell: flatpak override --user {{ item }} --filesystem=host --talk-name=org.freedesktop.Flatpak
      loop:
        - com.jetbrains.IntelliJ-IDEA-Ultimate
        - com.jetbrains.PyCharm-Professional
        - com.jetbrains.GoLand
        - com.jetbrains.WebStorm
        - com.google.AndroidStudio
      loop_control:
        label: "{{ item }}"
