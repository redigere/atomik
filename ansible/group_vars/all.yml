atomik_repositories:
  brave-browser:
    content: |
      [brave-browser]
      name=Brave Browser
      baseurl=https://brave-browser-rpm-release.s3.brave.com/$basearch
      enabled=1
      gpgcheck=1
      gpgkey=https://brave-browser-rpm-release.s3.brave.com/brave-core.asc

atomik_flatpak_remote: flathub
atomik_flatpak_remote_url: "https://dl.flathub.org/repo/flathub.flatpakrepo"
atomik_flatpak_verified: []
atomik_flatpak_overrides: {}

atomik_firewall_services:
  - ssh
  - dhcpv6-client

atomik_ssh_config: |
  PermitRootLogin no
  PasswordAuthentication no
  PubkeyAuthentication yes
  X11Forwarding no
  ClientAliveInterval 300
  Compression yes
  TCPKeepAlive yes
  UseDNS no
  AllowUsers @wheel

atomik_sysctl:
  fs:
    file-max: 9223372036854775807
    inotify:
      max_user_watches: 524288
    protected_fifos: 2
    protected_hardlinks: 1
    protected_regular: 2
    protected_symlinks: 1
    suid_dumpable: 0
  kernel:
    core_uses_pid: 1
    dmesg_restrict: 1
    kptr_restrict: 2
    numa_balancing: 0
    panic: 10
    pid_max: 4194304
    printk: "3 3 3 3"
    sched_autogroup_enabled: 0
    sched_latency_ns: 6000000
    sched_migration_cost_ns: 500000
    sched_min_granularity_ns: 3000000
    sched_wakeup_granularity_ns: 4000000
    sysrq: 0
    threads-max: 1048576
    timer_migration: 0
    unprivileged_bpf_disabled: 1
  net:
    ipv4:
      conf:
        all:
          accept_redirects: 0
          accept_source_route: 0
          arp_announce: 2
          arp_ignore: 1
          send_redirects: 0
        default:
          accept_redirects: 0
          accept_source_route: 0
          send_redirects: 0
      icmp_echo_ignore_broadcasts: 1
      ip_forward: 0
      ping_group_range: "0 2147483647"
      tcp_fastopen: 3
      tcp_rfc1337: 1
      tcp_syncookies: 1
      tcp_timestamps: 0
    ipv6:
      conf:
        all:
          accept_redirects: 0
          accept_source_route: 0
          disable_ipv6: 0
        default:
          accept_redirects: 0
          accept_source_route: 0
          disable_ipv6: 0
  vm:
    compaction_proactiveness: 0
    dirty_background_ratio: 5
    dirty_expire_centisecs: 3000
    dirty_ratio: 10
    dirty_writeback_centisecs: 1500
    max_map_count: 2147483642
    overcommit_memory: 1
    overcommit_ratio: 50
    page_cluster: 0
    page_lock_unfairness: 1
    panic_on_oom: 0
    swappiness: 10
    vfs_cache_pressure: 50
    watermark_boost_factor: 0
    zone_reclaim_mode: 0

atomik_limits:
  hard:
    memlock: 8388608
    nofile: 2097152
    nproc: 524288
  soft:
    memlock: 8388608
    nofile: 1048576
    nproc: 262144

atomik_sudo_config: |
  Defaults timestamp_timeout=5
  Defaults lecture=never
  Defaults passwd_timeout=0
  Defaults use_pty
  Defaults logfile="/var/log/sudo.log"

atomik_permissions:
  /boot: "0755"
  /boot/loader: "0755"
  /etc/group: "0644"
  /etc/gshadow: "0000"
  /etc/passwd: "0644"
  /etc/shadow: "0000"
  /root: "0700"

atomik_oomd_config: |
  [OOM]
  SwapUsedLimit=70%
  DefaultMemoryPressureLimit=40%
  DefaultMemoryPressureDurationSec=5s

atomik_oomd_user_slice: |
  [Service]
  ManagedOOMMemoryPressure=kill
  ManagedOOMSwap=kill

atomik_oomd_protected_config: |
  [Service]
  ManagedOOMMemoryPressure=kill
  ManagedOOMSwap=kill
  OOMScoreAdjust=-500

atomik_oomd_protected_services:
  silverblue:
    - gdm
    - gnome-session
    - gnome-session-wayland
    - gnome-session-x11
    - gnome-shell
    - pipewire
    - pipewire-pulse
    - wireplumber
  kinoite:
    - kwin
    - pipewire
    - pipewire-pulse
    - plasma-shell
    - startplasma
    - wireplumber
  cosmic-atomic:
    - cosmic-comp
    - pipewire
    - pipewire-pulse
    - wireplumber

atomik_desktop_scheduler_services:
  silverblue:
    - gnome-shell
  kinoite:
    - kwin
  cosmic-atomic:
    - cosmic-comp

atomik_zram_config: |
  [zram0]
  zram-size = ram / 2
  compression-algorithm = zstd
  swap-priority = 100
  fs-type = swap

atomik_swapfile_service: |
  [Unit]
  Description=Atomik Swapfile Creator
  ConditionPathExists=!/var/swapfile

  [Service]
  Type=oneshot
  ExecStart=/sbin/btrfs filesystem mkswapfile --size 4G /var/swapfile
  RemainAfterExit=yes

  [Install]
  WantedBy=multi-user.target

atomik_swapfile_unit: |
  [Unit]
  Description=Atomik Disk Swapfile
  Requires=atomik-swapfile.service
  After=atomik-swapfile.service

  [Swap]
  What=/var/swapfile
  Priority=10

  [Install]
  WantedBy=swap.target

atomik_io_udev_rules: |
  ACTION=="add|change", KERNEL=="nvme[0-9]*", ATTR{queue/scheduler}="kyber"
  ACTION=="add|change", KERNEL=="sd[a-z]|mmcblk[0-9]*", ATTR{queue/scheduler}="bfq"

atomik_thp_tmpfiles: "w /sys/kernel/mm/transparent_hugepage/defrag - - - - defer"

atomik_desktop_scheduler_config: |
  [Service]
  OOMScoreAdjust=-500
  IOSchedulingClass=best-effort
  IOSchedulingPriority=0
  CPUSchedulingPolicy=rr
  CPUSchedulingPriority=1

atomik_default_shell: /usr/bin/fish
atomik_fish_config: |
  if status is-interactive
      set -g fish_greeting ""
      set -g fish_history_max 10000
      alias ll="ls -l"
      alias la="ls -la"
      alias update="rpm-ostree upgrade"
      alias cleanup="rpm-ostree cleanup -m"
      alias rebuild="rpm-ostree initramfs --enable && rpm-ostree upgrade"
      alias ide="idea"
      alias astudio="android-studio"
  end

atomik_gnome_dconf:
  - path: /org/gnome/desktop/interface/enable-animations
    value: "false"
  - path: /org/gnome/desktop/privacy/send-technical-reports
    value: "false"
  - path: /org/gnome/desktop/privacy/report-technical-problems
    value: "false"
  - path: /org/gnome/desktop/search-providers/disable-external
    value: "true"
  - path: /org/gnome/desktop/lockdown/disable-command-line
    value: "false"
  - path: /org/gnome/desktop/interface/icon-theme
    value: "'Tela-circle-nord-dark'"
  - path: /org/gnome/desktop/interface/cursor-theme
    value: "'Nordic-cursors'"

