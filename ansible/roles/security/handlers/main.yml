---
- name: Reload sshd
  ansible.builtin.systemd:
    name: "{{ atomik_sshd_service | default('sshd') }}"
    state: reloaded

- name: Reload sysctl
  ansible.builtin.shell: sysctl --system

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reload udev
  ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger

- name: Apply tuned profile
  ansible.builtin.shell: tuned-adm profile atomik

- name: Enable thermald
  ansible.builtin.systemd:
    name: thermald
    state: started
    enabled: true

- name: Restart zram
  ansible.builtin.systemd:
    name: systemd-zram-setup@zram0.service
    state: restarted

- name: Enable swapfile service
  ansible.builtin.systemd:
    name: atomik-swapfile.service
    state: started
    enabled: true

- name: Enable swap unit
  ansible.builtin.systemd:
    name: var-swapfile.swap
    state: started
    enabled: true

- name: Rebuild grub
  ansible.builtin.shell: |
    if command -v grub2-mkconfig &>/dev/null; then
      grub2-mkconfig -o /boot/grub2/grub.cfg
    elif command -v grub-mkconfig &>/dev/null; then
      grub-mkconfig -o /boot/grub/grub.cfg
    else
      echo "No grub-mkconfig found"
    fi
