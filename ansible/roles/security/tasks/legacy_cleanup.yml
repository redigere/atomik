---

- name: Stop and disable legacy swapfile service
  ansible.builtin.systemd:
    name: bora-swapfile.service
    state: stopped
    enabled: false
    masked: true
  failed_when: false

- name: Remove legacy swapfile service files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/bora-swapfile.service
    - /etc/systemd/system/multi-user.target.wants/bora-swapfile.service
  failed_when: false

- name: Find legacy OOMD dropins
  ansible.builtin.find:
    paths: /etc/systemd/system
    patterns: "99-bora-oomd.conf"
    file_type: file
  register: legacy_oomd_dropins

- name: Remove legacy OOMD dropins
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ legacy_oomd_dropins.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  notify: Reload systemd

- name: Find legacy scheduler dropins
  ansible.builtin.find:
    paths: /etc/systemd/system
    patterns: "99-bora-scheduler.conf"
    file_type: file
  register: legacy_sched_dropins

- name: Remove legacy scheduler dropins
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ legacy_sched_dropins.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  notify: Reload systemd

- name: Remove legacy OOMD main config
  ansible.builtin.file:
    path: /etc/systemd/oomd.conf.d/99-bora.conf
    state: absent
  failed_when: false

- name: Remove legacy sysctl configs
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/sysctl.d/99-bora-hardening.conf
    - /etc/sysctl.d/99-bora-dynamic.conf
  failed_when: false

- name: Remove legacy limits config
  ansible.builtin.file:
    path: /etc/security/limits.d/99-bora.conf
    state: absent
  failed_when: false

- name: Remove legacy container hook
  ansible.builtin.file:
    path: /etc/profile.d/z-bora-container-hook.sh
    state: absent
  failed_when: false

- name: Remove legacy status file
  ansible.builtin.file:
    path: /etc/bora-status.json
    state: absent
  failed_when: false

- name: Remove legacy fail2ban config
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d/bora.local
    state: absent
  failed_when: false

- name: Remove legacy swapfile unit
  ansible.builtin.file:
    path: /etc/systemd/system/var-swapfile.swap
    state: absent
  failed_when: false

- name: Clean legacy transaction temp dirs
  ansible.builtin.shell: |
    rm -rf /var/home/{{ atomik_user }}/.tmp/bora-transaction-*
  failed_when: false
  become: true
  become_user: "{{ atomik_user }}"

- name: Remove legacy container hook volume from user containers.conf
  ansible.builtin.lineinfile:
    path: "/var/home/{{ atomik_user }}/.config/containers/containers.conf"
    regexp: '.*z-bora-container-hook.*'
    state: absent
  failed_when: false

- name: Remove legacy container hook volume from system containers.conf
  ansible.builtin.lineinfile:
    path: /etc/containers/containers.conf
    regexp: '.*z-bora-container-hook.*'
    state: absent
  become: true
  failed_when: false

- name: Fix legacy volume_path in system containers.conf
  ansible.builtin.replace:
    path: /etc/containers/containers.conf
    regexp: '/var/lib/containers/storage/bora/'
    replace: '/var/lib/containers/storage/'
  become: true
  failed_when: false

- name: Fix legacy paths in system storage-nested.conf
  ansible.builtin.replace:
    path: /etc/containers/storage-nested.conf
    regexp: '/storage/bora/'
    replace: '/storage/'
  become: true
  failed_when: false
