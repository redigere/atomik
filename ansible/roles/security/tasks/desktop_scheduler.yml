---

- name: Create desktop scheduler dropins
  ansible.builtin.template:
    src: desktop_scheduler.service.d.j2
    dest: "/etc/systemd/system/{{ item }}.service.d/99-atomik-scheduler.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ atomik_desktop_scheduler_services[atomik_variant] | default([]) }}"
  loop_control:
    label: "{{ item }}"
  notify: Reload systemd
