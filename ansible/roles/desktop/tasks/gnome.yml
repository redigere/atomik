---

- name: Check GDM health
  ansible.builtin.shell: systemctl is-active gdm
  register: gdm_check
  changed_when: false
  failed_when: false

- name: Apply dconf settings
  ansible.builtin.shell: |
    dconf write {{ item.path }} {{ item.value }}
  become: true
  become_user: "{{ atomik_user }}"
  loop: "{{ atomik_gnome_dconf }}"
  loop_control:
    label: "{{ item.path }}"
  when: gdm_check.rc == 0
  register: dconf_result
  changed_when: dconf_result.rc == 0
  failed_when: false

- name: Create App Nap script directory
  ansible.builtin.file:
    path: /usr/local/lib/atomik
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy App Nap script
  ansible.builtin.template:
    src: atomik-appnap.sh.j2
    dest: /usr/local/lib/atomik/atomik-appnap.sh
    owner: root
    group: root
    mode: "0755"

- name: Create systemd user directory
  ansible.builtin.file:
    path: "/var/home/{{ atomik_user }}/.config/systemd/user"
    state: directory
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0755"

- name: Deploy App Nap service
  ansible.builtin.template:
    src: atomik-appnap.service.j2
    dest: "/var/home/{{ atomik_user }}/.config/systemd/user/atomik-appnap.service"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
  notify: Enable App Nap service
