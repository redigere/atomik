---

- name: Deploy App Nap script
  ansible.builtin.template:
    src: atomik-appnap.sh.j2
    dest: /usr/local/lib/atomik/atomik-appnap.sh
    owner: root
    group: root
    mode: "0755"

- name: Create systemd user directory
  ansible.builtin.file:
    path: "/var/home/{{ atomik_user }}/.config/systemd/user"
    state: directory
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0755"

- name: Deploy App Nap service
  ansible.builtin.template:
    src: atomik-appnap.service.j2
    dest: "/var/home/{{ atomik_user }}/.config/systemd/user/atomik-appnap.service"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
  notify: Enable App Nap service
