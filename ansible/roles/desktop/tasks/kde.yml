---

- name: Detect KDE config tool
  ansible.builtin.shell: |
    if command -v kwriteconfig6 >/dev/null 2>&1; then
      echo "kwriteconfig6"
    elif command -v kwriteconfig5 >/dev/null 2>&1; then
      echo "kwriteconfig5"
    else
      echo "none"
    fi
  become: true
  become_user: "{{ atomik_user }}"
  register: kwriteconfig_result
  changed_when: false

- name: Set KDE config tool
  ansible.builtin.set_fact:
    kde_config_tool: "{{ kwriteconfig_result.stdout }}"

- name: Apply KDE settings
  ansible.builtin.shell: |
    {{ kde_config_tool }} --file {{ item.file }} --group {{ item.group }} --key {{ item.key }} {{ item.value | default('') }}
  become: true
  become_user: "{{ atomik_user }}"
  loop: >-
    {{ atomik_kde_settings.animations | default([]) +
       atomik_kde_settings.baloo | default([]) +
       atomik_kde_settings.power | default([]) +
       atomik_kde_settings.taskbar | default([]) +
       atomik_kde_settings.telemetry | default([]) +
       atomik_kde_settings.wallet | default([]) +
       atomik_kde_settings.restrictions | default([]) }}
  loop_control:
    label: "{{ item.file }}/{{ item.group }}/{{ item.key }}"
  when: item.value is defined and kde_config_tool != 'none'

- name: Deploy custom look-and-feel package
  ansible.builtin.copy:
    src: look-and-feel/
    dest: ~/.local/share/plasma/look-and-feel/com.atomik.desktop/
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
  become: true
  become_user: "{{ atomik_user }}"

- name: Apply KDE theme settings
  ansible.builtin.shell: |
    {{ kde_config_tool }} --file kdeglobals --group General --key theme {{ atomik_kde_theme[atomik_variant].theme }}
    {{ kde_config_tool }} --file kdeglobals --group General --key ColorScheme {{ atomik_kde_theme[atomik_variant].colorscheme }}
    {{ kde_config_tool }} --file kdeglobals --group General --key font {{ atomik_kde_theme[atomik_variant].font }}
    {{ kde_config_tool }} --file kdeglobals --group General --key fixed {{ atomik_kde_theme[atomik_variant].monospace_font }}
    {{ kde_config_tool }} --file kdeglobals --group Icons --key IconTheme {{ atomik_kde_theme[atomik_variant].icon_theme }}
    {{ kde_config_tool }} --file kdeglobals --group Icons --key cursorTheme {{ atomik_kde_theme[atomik_variant].cursor_theme }}
    {{ kde_config_tool }} --file kdeglobals --group KDE --key LookAndFeelPackage com.atomik.desktop
    {{ kde_config_tool }} --file ksplashrc --group KSplash --key Engine none
    {{ kde_config_tool }} --file ksplashrc --group KSplash --key Theme none
  become: true
  become_user: "{{ atomik_user }}"
  when: atomik_kde_theme[atomik_variant] | length > 0 and kde_config_tool != 'none'

- name: Deploy KDE panel setup script
  ansible.builtin.copy:
    src: panels.py
    dest: /tmp/kde_panels.py
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
  become: true

- name: Run KDE panel setup
  ansible.builtin.shell: |
    systemctl --user stop plasma-plasmashell 2>/dev/null || true
    killall -9 plasmashell 2>/dev/null || true
    sleep 1
    python3 /tmp/kde_panels.py
    systemctl --user start plasma-plasmashell
    sleep 4
    busctl --user call org.kde.plasmashell /PlasmaShell org.kde.PlasmaShell evaluateScript s "
    var ps = panels();
    for (var i = 0; i < ps.length; i++) {
        var p = ps[i];
        if (p.location == 'bottom') {
            p.hiding = 'autohide';
            p.minimumLength = 0;
            p.maximumLength = 0;
            p.lengthMode = 'fit';
            p.alignment = 'center';
            p.offset = 24;
        } else if (p.location == 'top') {
            p.hiding = 'none';
            p.lengthMode = 'fill';
            p.alignment = 'center';
            p.offset = 0;
            p.immutability = 2;
        }
    }
    "
  become: true
  become_user: "{{ atomik_user }}"
  register: panel_result
  changed_when: panel_result.rc == 0
  failed_when: false
