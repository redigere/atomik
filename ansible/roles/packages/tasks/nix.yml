---
- name: Check if Nix is installed
  ansible.builtin.stat:
    path: "/var/home/{{ atomik_user }}/.nix-profile/bin/nix"
  register: nix_binary

- name: Check if nix-user-chroot is available
  ansible.builtin.stat:
    path: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot"
  register: nix_chroot_stat

- name: Setup nix-user-chroot
  when: not nix_chroot_stat.stat.exists
  block:
    - name: Create nix-user-chroot directory
      ansible.builtin.file:
        path: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin"
        state: directory
        owner: "{{ atomik_user }}"
        group: "{{ atomik_user }}"
        mode: "0755"

    - name: Download nix-user-chroot
      ansible.builtin.get_url:
        url: "https://github.com/nix-community/nix-user-chroot/releases/download/2.1.1/nix-user-chroot-bin-2.1.1-x86_64-unknown-linux-musl"
        dest: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot"
        mode: "0755"
        owner: "{{ atomik_user }}"
        group: "{{ atomik_user }}"

- name: Setup Nix in user space
  when: not nix_binary.stat.exists
  block:
    - name: Create Nix root directory
      ansible.builtin.file:
        path: "/var/home/{{ atomik_user }}/.nix"
        state: directory
        owner: "{{ atomik_user }}"
        group: "{{ atomik_user }}"
        mode: "0755"

    - name: Create nix wrapper script
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          exec /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix -- /nix/var/nix/profiles/default/bin/nix "$@"
        dest: "/var/home/{{ atomik_user }}/.local/bin/nix"
        owner: "{{ atomik_user }}"
        group: "{{ atomik_user }}"
        mode: "0755"

    - name: Download Nix installer
      ansible.builtin.get_url:
        url: https://nixos.org/nix/install
        dest: "/tmp/nix-install-{{ atomik_user }}.sh"
        mode: "0755"

    - name: Run Nix installer via nix-user-chroot
      ansible.builtin.shell: |
        set -euo pipefail
        export HOME="/var/home/{{ atomik_user }}"
        /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix -- sh /tmp/nix-install-{{ atomik_user }}.sh --no-daemon --yes
      become: true
      become_user: "{{ atomik_user }}"
      args:
        executable: /bin/bash
      register: nix_install
      changed_when: nix_install.rc == 0

    - name: Remove installer
      ansible.builtin.file:
        path: "/tmp/nix-install-{{ atomik_user }}.sh"
        state: absent

- name: Ensure Nix profile scripts are sourced
  ansible.builtin.copy:
    content: |
      # Nix user-level package manager
      if test -f /var/home/{{ atomik_user }}/.nix-profile/etc/profile.d/nix.fish
          source /var/home/{{ atomik_user }}/.nix-profile/etc/profile.d/nix.fish
      end
    dest: "/var/home/{{ atomik_user }}/.config/fish/conf.d/nix.fish"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    backup: false

- name: Add Nix channels
  ansible.builtin.shell: |
    set -euo pipefail
    export HOME="/var/home/{{ atomik_user }}"
    . .nix-profile/etc/profile.d/nix.sh 2>/dev/null || true
    nix-channel --list 2>/dev/null | grep -q "nixpkgs" || nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
    nix-channel --update
  become: true
  become_user: "{{ atomik_user }}"
  args:
    executable: /bin/bash
    chdir: "/var/home/{{ atomik_user }}"
  register: nix_channel
  changed_when: nix_channel.rc == 0
  failed_when: false

- name: Install Nix packages
  ansible.builtin.shell: |
    set -euo pipefail
    export HOME="/var/home/{{ atomik_user }}"
    . .nix-profile/etc/profile.d/nix.sh 2>/dev/null || true
    nix profile install nixpkgs#{{ item }}
  become: true
  become_user: "{{ atomik_user }}"
  args:
    executable: /bin/bash
    chdir: "/var/home/{{ atomik_user }}"
  loop: "{{ atomik_nix_packages }}"
  loop_control:
    label: "{{ item }}"
  register: nix_install_pkg
  changed_when: nix_install_pkg.rc == 0
  failed_when: false
