---
# Idempotency checks
- name: Check if Nix store exists
  ansible.builtin.stat:
    path: "/var/home/{{ atomik_user }}/.nix/store"
  register: nix_store

- name: Check if nix-user-chroot binary exists
  ansible.builtin.stat:
    path: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot"
  register: nix_chroot_bin

- name: Check if nix binary exists in chroot
  ansible.builtin.stat:
    path: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot"
  register: nix_profile_check
  failed_when: false

# Setup nix-user-chroot (if missing)
- name: Create nix-user-chroot directory
  ansible.builtin.file:
    path: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin"
    state: directory
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0755"
  when: not nix_chroot_bin.stat.exists

- name: Download nix-user-chroot
  ansible.builtin.get_url:
    url: "https://github.com/nix-community/nix-user-chroot/releases/download/2.1.1/nix-user-chroot-bin-2.1.1-x86_64-unknown-linux-musl"
    dest: "/var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot"
    mode: "0755"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
  when: not nix_chroot_bin.stat.exists

# Install Nix (if missing)
- name: Create Nix root directory
  ansible.builtin.file:
    path: "/var/home/{{ atomik_user }}/.nix"
    state: directory
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0755"
  when: not nix_store.stat.exists

- name: Create nix helper script
  ansible.builtin.copy:
    content: |
      #!/bin/sh
      export HOME="/home/{{ atomik_user }}"
      exec /home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /home/{{ atomik_user }}/.nix /home/{{ atomik_user }}/.nix-profile/bin/nix "$@"
    dest: "/var/home/{{ atomik_user }}/.local/bin/nix"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0755"
  when: not nix_store.stat.exists

- name: Download Nix installer
  ansible.builtin.get_url:
    url: https://nixos.org/nix/install
    dest: "/tmp/nix-install-{{ atomik_user }}.sh"
    mode: "0755"
  when: not nix_store.stat.exists

- name: Run Nix installer via nix-user-chroot
  ansible.builtin.shell: |
    set -euo pipefail
    export HOME="/var/home/{{ atomik_user }}"
    /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix sh /tmp/nix-install-{{ atomik_user }}.sh --no-daemon --yes
  become: true
  become_user: "{{ atomik_user }}"
  args:
    executable: /bin/bash
  register: nix_install
  changed_when: nix_install.rc == 0
  when: not nix_store.stat.exists

- name: Remove installer
  ansible.builtin.file:
    path: "/tmp/nix-install-{{ atomik_user }}.sh"
    state: absent
  when: not nix_store.stat.exists

# Configure Nix
- name: Ensure nix.conf has experimental features
  ansible.builtin.copy:
    content: |
      experimental-features = nix-command flakes
    dest: "/var/home/{{ atomik_user }}/.config/nix/nix.conf"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    backup: false

- name: Ensure Nix fish shell integration
  ansible.builtin.copy:
    content: |
      # Nix user-level package manager
      if test -f /home/{{ atomik_user }}/.nix-profile/etc/profile.d/nix.fish
          source /home/{{ atomik_user }}/.nix-profile/etc/profile.d/nix.fish
      end
    dest: "/var/home/{{ atomik_user }}/.config/fish/conf.d/nix.fish"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    backup: false

# Add channels (if missing)
- name: Add Nix channels
  ansible.builtin.shell: |
    set -euo pipefail
    /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix /home/{{ atomik_user }}/.nix-profile/bin/nix-channel --list 2>/dev/null | grep -q "nixpkgs" || /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix /home/{{ atomik_user }}/.nix-profile/bin/nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
    /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix /home/{{ atomik_user }}/.nix-profile/bin/nix-channel --update
  become: true
  become_user: "{{ atomik_user }}"
  args:
    executable: /bin/bash
  register: nix_channel
  changed_when: nix_channel.rc == 0
  failed_when: false

# Install packages (skip if already installed)
- name: Check which Nix packages are installed
  ansible.builtin.shell: |
    /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix /home/{{ atomik_user }}/.nix-profile/bin/nix profile list 2>/dev/null | awk '{print $4}' | cut -d'#' -f2 || true
  become: true
  become_user: "{{ atomik_user }}"
  args:
    executable: /bin/bash
  register: nix_installed_list
  changed_when: false
  failed_when: false

- name: Install missing Nix packages
  ansible.builtin.shell: |
    set -euo pipefail
    /var/home/{{ atomik_user }}/.nix-user-chroot/bin/nix-user-chroot /var/home/{{ atomik_user }}/.nix /home/{{ atomik_user }}/.nix-profile/bin/nix profile install nixpkgs#{{ item }}
  become: true
  become_user: "{{ atomik_user }}"
  args:
    executable: /bin/bash
  loop: "{{ atomik_nix_packages }}"
  loop_control:
    label: "{{ item }}"
  register: nix_install_pkg
  changed_when: nix_install_pkg.rc == 0
  failed_when: false
  when: item not in (nix_installed_list.stdout_lines | default([]))
