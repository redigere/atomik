---

- name: Add Flathub remote
  ansible.builtin.shell: |
    flatpak remote-add --if-not-exists {{ atomik_flatpak_remote }} {{ atomik_flatpak_remote_url }}
  register: remote_result
  changed_when: remote_result.rc == 0
  failed_when: false

- name: Install Flatpak applications
  ansible.builtin.shell: |
    flatpak install -y {{ atomik_flatpak_remote }} {{ item }}
  loop: "{{ atomik_flatpak_verified }}"
  loop_control:
    label: "{{ item }}"
  register: flatpak_install_result
  changed_when: flatpak_install_result.rc == 0
  failed_when: false

- name: Reset Flatpak overrides before applying
  ansible.builtin.shell: |
    flatpak override --user --reset {{ item.key }}
  loop: "{{ atomik_flatpak_overrides | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.value | length > 0
  failed_when: false

- name: Apply Flatpak overrides
  ansible.builtin.shell: |
    flatpak override --user {{ item.key }} {{ item.value | join(' ') }}
  loop: "{{ atomik_flatpak_overrides | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.value | length > 0

- name: Find stale Flatpak override files
  ansible.builtin.find:
    paths: /var/home/{{ atomik_user }}/.local/share/flatpak/overrides
    patterns: "*"
    file_type: file
  register: flatpak_overrides_all

- name: Get installed Flatpak apps
  ansible.builtin.shell: |
    flatpak list --columns=application 2>/dev/null || true
  register: flatpak_installed
  changed_when: false

- name: Remove stale Flatpak overrides
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ flatpak_overrides_all.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: item.path | basename not in flatpak_installed.stdout_lines
