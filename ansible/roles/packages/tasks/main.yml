---

- name: Skip in containers
  when: >
    ansible_facts.get('virtualization_type', '') == 'container' or
    ansible_facts.get('file', {}).get('/run/.toolboxenv', {}).get('exists', false)
  block:
    - name: Skip message
      ansible.builtin.debug:
        msg: "Skipping package management in container environment"
    - name: End play
      ansible.builtin.meta: end_play

- name: Manage RPM-OSTree packages
  when: not (ansible_facts.get('virtualization_type', '') == 'container')
  block:
    - name: Install packages via rpm-ostree
      ansible.builtin.shell: |
        rpm-ostree install -y --idempotent --allow-inactive {{ atomik_rpm_install | join(' ') }}
      register: rpm_install_result
      changed_when: "'Queued' in rpm_install_result.stdout"
      failed_when: false

    - name: Remove packages via rpm-ostree override
      ansible.builtin.shell: |
        rpm-ostree override remove {{ atomik_rpm_remove | join(' ') }}
      register: override_result
      changed_when: "'Queued for removal' in override_result.stdout"
      failed_when: false

    - name: Apply live changes
      ansible.builtin.shell: rpm-ostree apply-live --allow-replacement
      register: apply_result
      changed_when: apply_result.rc == 0
      failed_when: false

    - name: Install variant-specific packages
      ansible.builtin.shell: |
        rpm-ostree install -y --idempotent --allow-inactive {{ atomik_variant_install[atomik_variant] | default([]) | join(' ') }}
      when: atomik_variant_install[atomik_variant] | default([]) | length > 0
      register: variant_install_result
      changed_when: "'Queued' in variant_install_result.stdout"
      failed_when: false

    - name: Remove variant-specific packages
      ansible.builtin.shell: |
        rpm-ostree override remove {{ atomik_variant_remove[atomik_variant] | default([]) | join(' ') }}
      when: atomik_variant_remove[atomik_variant] | default([]) | length > 0
      register: variant_remove_result
      changed_when: "'Queued for removal' in variant_remove_result.stdout"
      failed_when: false

- name: Manage Flatpak packages
  block:
    - name: Add Flathub remote
      ansible.builtin.shell: |
        flatpak remote-add --if-not-exists {{ atomik_flatpak_remote }} {{ atomik_flatpak_remote_url }}
      register: remote_result
      changed_when: remote_result.rc == 0
      failed_when: false

    - name: Install Flatpak applications
      ansible.builtin.shell: |
        flatpak install -y {{ atomik_flatpak_remote }} {{ item }}
      loop: "{{ atomik_flatpak_verified }}"
      loop_control:
        label: "{{ item }}"
      register: flatpak_install_result
      changed_when: flatpak_install_result.rc == 0
      failed_when: false

    - name: Apply Flatpak overrides
      ansible.builtin.shell: |
        flatpak override --user {{ item.key }} {{ item.value | join(' ') }}
      loop: "{{ atomik_flatpak_overrides | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: item.value | length > 0

- name: Setup JetBrains Toolbox
  ansible.builtin.shell: |
    dest_dir="$HOME/.local/share/JetBrains/Toolbox"
    bin_dir="$dest_dir/bin"
    toolbox_bin="$bin_dir/jetbrains-toolbox"
    if [ -f "$toolbox_bin" ]; then
      exit 0
    fi
    mkdir -p "$bin_dir"
    jb_url=$(curl -s "https://data.services.jetbrains.com/products/releases?code=TBA&latest=true&type=release" | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['TBA'][0]['downloads']['linux']['link'])")
    curl -fsSL "$jb_url" -o /tmp/jb-tb.tar.gz
    tar -xzf /tmp/jb-tb.tar.gz -C /tmp/
    jb_dir=$(find /tmp -maxdepth 1 -type d -name "jetbrains-toolbox-*" | head -1)
    if [ -n "$jb_dir" ] && [ -f "$jb_dir/bin/jetbrains-toolbox" ]; then
      cp "$jb_dir/bin/jetbrains-toolbox" "$toolbox_bin"
      chmod +x "$toolbox_bin"
      rm -rf /tmp/jb-tb.tar.gz "$jb_dir"
    fi
  become_user: "{{ atomik_user }}"
  register: toolbox_result
  changed_when: toolbox_result.rc == 0
  failed_when: false
