---

- name: Install pnpm
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    npm install -g pnpm
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.local/share/pnpm/bin/pnpm"

- name: Deploy pnpm shell config (Bash)
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bashrc.d/pnpm.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      export PNPM_HOME="$HOME/.local/share/pnpm"
      case ":$PATH:" in
        *":$PNPM_HOME/bin:"*) ;;
        *) export PATH="$PNPM_HOME/bin:$PATH" ;;
      esac

- name: Deploy pnpm shell config (Fish)
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.config/fish/conf.d/pnpm.fish"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      set -gx PNPM_HOME "$HOME/.local/share/pnpm"
      if test -d "$PNPM_HOME"
          fish_add_path "$PNPM_HOME/bin"
      end
