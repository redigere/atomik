---
- name: Create bash.d directory
  ansible.builtin.file:
    path: "/var/home/{{ atomik_user }}/.bash.d"
    state: directory
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0755"

- name: Deploy JetBrains shell aliases
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/jetbrains.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      if command -v dex >/dev/null 2>&1; then
          alias jetbrains-toolbox="dex $HOME/.local/share/applications/jetbrains-toolbox.desktop"
          alias idea="dex $HOME/.local/share/applications/jetbrains-idea-2962247c-c234-4f4f-b69a-1ba655f7a676.desktop"
          alias android-studio="dex $HOME/.local/share/applications/jetbrains-studio-dc863395-7115-4ff2-948e-3f642bc481dd.desktop"
      fi

- name: Install nvm
  ansible.builtin.shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.nvm/nvm.sh"

- name: Deploy nvm shell config
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/nvm.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$HOME/.nvm/bash_completion"

- name: Install opencode
  ansible.builtin.shell: mkdir -p "$HOME/.opencode/bin" && curl -fsSL https://opencode.ai/install | sh
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.opencode/bin/opencode"

- name: Deploy opencode shell config
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/opencode.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      export PATH="$HOME/.opencode/bin:$PATH"

- name: Install pnpm
  ansible.builtin.shell: npm install -g pnpm
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.local/share/pnpm/bin/pnpm"

- name: Deploy pnpm shell config
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/pnpm.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      export PNPM_HOME="$HOME/.local/share/pnpm"
      case ":$PATH:" in
        *":$PNPM_HOME/bin:"*) ;;
        *) export PATH="$PNPM_HOME/bin:$PATH" ;;
      esac

- name: Install rustup
  ansible.builtin.shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.cargo/bin/cargo"

- name: Deploy cargo shell config
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/cargo.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      if [ -f "$HOME/.cargo/env" ]; then
          . "$HOME/.cargo/env"
      fi

- name: Install antigravity
  ansible.builtin.shell: curl -fsSL https://antigravity.ai/install | sh
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.local/bin/antigravity"

- name: Deploy antigravity shell config
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/antigravity.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      export PATH="$HOME/.local/bin:$PATH"

- name: Install sdkman
  ansible.builtin.shell: curl -s "https://get.sdkman.io" | bash
  become: true
  become_user: "{{ atomik_user }}"
  args:
    creates: "/var/home/{{ atomik_user }}/.sdkman/bin/sdkman-init.sh"

- name: Deploy sdkman shell config
  ansible.builtin.copy:
    dest: "/var/home/{{ atomik_user }}/.bash.d/sdkman.sh"
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
    content: |
      export SDKMAN_DIR="$HOME/.sdkman"
      [[ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ]] && source "$SDKMAN_DIR/bin/sdkman-init.sh"

- name: Check if .bashrc sources .bash.d
  ansible.builtin.lineinfile:
    path: "/var/home/{{ atomik_user }}/.bashrc"
    regexp: "\\.bash\\.d"
    state: absent
  register: devtools_bashrc_check

- name: Append .bash.d sourcing to .bashrc
  ansible.builtin.blockinfile:
    path: "/var/home/{{ atomik_user }}/.bashrc"
    marker: "# {mark} ATOMIK BASH.D"
    insertafter: EOF
    block: |
      if [ -d ~/.bash.d ]; then
          for rc in ~/.bash.d/*; do
              if [ -f "$rc" ]; then
                  . "$rc"
              fi
          done
      fi
    owner: "{{ atomik_user }}"
    group: "{{ atomik_user }}"
    mode: "0644"
