---
name: validate
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  validate-scripts:
    name: validate scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nodejs

      - name: Set up Python virtual environment
        run: |
          python3 -m venv /tmp/atomik-venv
          /tmp/atomik-venv/bin/pip install --quiet pyyaml jsonschema

      - name: Validate Python syntax and venv imports
        run: |
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/panels.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/apply_kde.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/revert_kde.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/install_nordic_kde.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/gnome/apply_gnome.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/nix/apply_nix.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/codium/apply_codium.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/devtools/apply_devtools.py
          /tmp/atomik-venv/bin/python3 -m py_compile ansible/roles/desktop/files/panels.py

      - name: Log JSON validation
        run: |
          python3 -m json.tool \
            extra/kde/look-and-feel/com.atomik.desktop/metadata.json /dev/null
          python3 -m json.tool \
            ansible/roles/desktop/files/look-and-feel/com.atomik.desktop/metadata.json /dev/null

      - name: Log JavaScript validation KDE panel scripts
        run: |
          node --check extra/kde/dock.js
          node --check extra/kde/topbar.js

      - name: Log SVG validation panel background
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          for svg in ['extra/kde/panel-background.svg', 'ansible/roles/desktop/files/panel-background.svg']:
              tree = ET.parse(svg)
              root = tree.getroot()
              assert root.tag.endswith('svg'), f'{svg}: not an SVG'
              print(f'{svg}: valid SVG, viewBox={root.get(\"viewBox\", \"N/A\")}')
          "

      - name: Log Makefile targets validation
        run: |
          make -n lint 2>/dev/null || true
          grep -q '^lint:' Makefile && grep -q '^test:' Makefile && grep -q '^clean:' Makefile

  verify-ansible-definitions:
    name: verify ansible definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible-core

      - name: Set up Python virtual environment
        run: |
          python3 -m venv /tmp/atomik-venv
          /tmp/atomik-venv/bin/pip install --quiet pyyaml

      - name: Install collections
        run: ansible-galaxy collection install ansible.posix community.general

      - name: Log template variable verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import re, yaml, os, sys
          with open('ansible/group_vars/all.yml') as f:
              vars_def = yaml.safe_load(f)
          defined = set(vars_def.keys())
          refs = set()
          tpl_dir = 'ansible/roles'
          for root, dirs, files in os.walk(tpl_dir):
              for f in files:
                  if not f.endswith('.j2'): continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      content = fh.read()
                  for m in re.finditer(r'atomik_\w+', content):
                      refs.add(m.group())
          missing = refs - defined
          if missing:
              print(f'TEMPLATE VARIABLES NOT IN group_vars: {missing}')
              sys.exit(1)
          print(f'All {len(refs)} template-referenced variables defined in group_vars.')
          "

      - name: Log file cross reference verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml, os, sys
          errors = []
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          for p in ['extra/kde/panel-background.svg',
                    'ansible/roles/desktop/files/panel-background.svg']:
              if not os.path.exists(p):
                  errors.append(f'MISSING: {p}')
          for p in ['extra/kde/look-and-feel/com.atomik.desktop/metadata.json',
                    'extra/kde/look-and-feel/com.atomik.desktop/contents/defaults',
                    'ansible/roles/desktop/files/look-and-feel/com.atomik.desktop/metadata.json',
                    'ansible/roles/desktop/files/look-and-feel/com.atomik.desktop/contents/defaults']:
              if not os.path.exists(p):
                  errors.append(f'MISSING: {p}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All file cross-references OK')
          "

      - name: Log extra and ansible file sync verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import filecmp, os, sys
          pairs = [
              ('extra/kde/panels.py', 'ansible/roles/desktop/files/panels.py'),
              ('extra/kde/panel-background.svg', 'ansible/roles/desktop/files/panel-background.svg'),
          ]
          errors = []
          for a, b in pairs:
              if not os.path.exists(a):
                  errors.append(f'MISSING: {a}')
                  continue
              if not os.path.exists(b):
                  errors.append(f'MISSING: {b}')
                  continue
              if filecmp.cmp(a, b, shallow=False):
                  print(f'{os.path.basename(a)}: in sync')
              else:
                  errors.append(f'DIVERGED: {a} != {b}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All extra/ <-> ansible/roles/desktop/files/ files in sync')
          "

      - name: Log role subtask list verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml, os, sys
          errors = []
          tasks_dir = 'ansible/roles'
          for root, dirs, files in os.walk(tasks_dir):
              for f in files:
                  if f != 'main.yml': continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      try:
                          tasks = yaml.safe_load(fh)
                      except: continue
                  if tasks is None:
                      errors.append(f'EMPTY: {path}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All role main task files non-empty')
          "

  validate-docs:
    name: validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nodejs
          npm install -g markdownlint-cli

      - name: Log markdown lint results
        run: |
          markdownlint --disable MD013 MD033 MD041 \
            README.md SPRINTS.md \
            docs/README.md docs/SPRINTS.md docs/INSTRUCTIONS.md || true

      - name: Log README file reference verification
        run: |
          python3 -c "
          import os, sys
          refs = [
              ('ansible/', 'ansible/ directory'),
              ('extra/kde/', 'extra/kde/ directory'),
              ('extra/kde/apply_kde.py', 'KDE apply script'),
              ('docs/SPRINTS.md', 'Sprint roadmap'),
          ]
          errors = []
          for path, desc in refs:
              if not os.path.exists(path):
                  errors.append(f'README references {desc} ({path}) but file not found')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('README file references valid')
          "

      - name: Log LICENSE file check
        run: test -f LICENSE

      - name: Log SPRINTS dot md structure verification
        run: grep -q '^# ' SPRINTS.md
