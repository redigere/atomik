---
name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  lint-playbook:
    name: lint playbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Ansible and Python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible-core python3-pip
          python3 -m venv /tmp/atomik-venv
          /tmp/atomik-venv/bin/pip install --quiet pyyaml

      - name: Install collections
        run: ansible-galaxy collection install ansible.posix community.general

      - name: Install linters
        run: pip install -q ansible-lint yamllint

      - name: Log syntax check site yml
        run: ansible-playbook ansible/site.yml --syntax-check -i ansible/inventories/localhost/hosts.yml

      - name: Log syntax check e2e yml
        run: ansible-playbook tests/e2e.yml --syntax-check -i ansible/inventories/localhost/hosts.yml

      - name: Log ansible lint results
        run: ansible-lint ansible/site.yml --skip-list var-naming,risky-shell-pipe,no-changed-when,command-instead-of-module,command-instead-of-shell,yaml[line-length],jinja[spacing],yaml[empty-lines],no-handler

  lint-yaml:
    name: lint yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install linters
        run: pip install -q yamllint

      - name: Log yaml lint results
        run: |
          yamllint --strict .yamllint
          yamllint --strict ansible/site.yml
          yamllint --strict ansible/group_vars/all.yml
          yamllint --strict tests/e2e.yml
          yamllint --strict .github/workflows/ci.yml

  validate-scripts:
    name: validate scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nodejs

      - name: Set up Python virtual environment
        run: |
          python3 -m venv /tmp/atomik-venv
          /tmp/atomik-venv/bin/pip install --quiet pyyaml jsonschema

      - name: Validate Python syntax and venv imports
        run: |
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/panels.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/apply_kde.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/revert_kde.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/kde/install_nordic_kde.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/gnome/apply_gnome.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/nix/apply_nix.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/codium/apply_codium.py
          /tmp/atomik-venv/bin/python3 -m py_compile extra/devtools/apply_devtools.py
          /tmp/atomik-venv/bin/python3 -m py_compile ansible/roles/desktop/files/panels.py

      - name: Log JSON validation
        run: |
          python3 -m json.tool \
            extra/kde/look-and-feel/com.atomik.desktop/metadata.json /dev/null
          python3 -m json.tool \
            ansible/roles/desktop/files/look-and-feel/com.atomik.desktop/metadata.json /dev/null

      - name: Log JavaScript validation KDE panel scripts
        run: |
          node --check extra/kde/dock.js
          node --check extra/kde/topbar.js

      - name: Log SVG validation panel background
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          for svg in ['extra/kde/panel-background.svg', 'ansible/roles/desktop/files/panel-background.svg']:
              tree = ET.parse(svg)
              root = tree.getroot()
              assert root.tag.endswith('svg'), f'{svg}: not an SVG'
              print(f'{svg}: valid SVG, viewBox={root.get(\"viewBox\", \"N/A\")}')
          "

      - name: Log Makefile targets validation
        run: |
          make -n lint 2>/dev/null || true
          grep -q '^lint:' Makefile && grep -q '^test:' Makefile && grep -q '^clean:' Makefile

  verify-ansible-definitions:
    name: verify ansible definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible-core

      - name: Set up Python virtual environment
        run: |
          python3 -m venv /tmp/atomik-venv
          /tmp/atomik-venv/bin/pip install --quiet pyyaml

      - name: Install collections
        run: ansible-galaxy collection install ansible.posix community.general

      - name: Log template variable verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import re, yaml, os, sys
          with open('ansible/group_vars/all.yml') as f:
              vars_def = yaml.safe_load(f)
          defined = set(vars_def.keys())
          refs = set()
          tpl_dir = 'ansible/roles'
          for root, dirs, files in os.walk(tpl_dir):
              for f in files:
                  if not f.endswith('.j2'): continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      content = fh.read()
                  for m in re.finditer(r'atomik_\w+', content):
                      refs.add(m.group())
          missing = refs - defined
          if missing:
              print(f'TEMPLATE VARIABLES NOT IN group_vars: {missing}')
              sys.exit(1)
          print(f'All {len(refs)} template-referenced variables defined in group_vars.')
          "

      - name: Log file cross reference verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml, os, sys
          errors = []
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          for p in ['extra/kde/panel-background.svg',
                    'ansible/roles/desktop/files/panel-background.svg']:
              if not os.path.exists(p):
                  errors.append(f'MISSING: {p}')
          for p in ['extra/kde/look-and-feel/com.atomik.desktop/metadata.json',
                    'extra/kde/look-and-feel/com.atomik.desktop/contents/defaults',
                    'ansible/roles/desktop/files/look-and-feel/com.atomik.desktop/metadata.json',
                    'ansible/roles/desktop/files/look-and-feel/com.atomik.desktop/contents/defaults']:
              if not os.path.exists(p):
                  errors.append(f'MISSING: {p}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All file cross-references OK')
          "

      - name: Log extra and ansible file sync verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import filecmp, os, sys
          pairs = [
              ('extra/kde/panels.py', 'ansible/roles/desktop/files/panels.py'),
              ('extra/kde/panel-background.svg', 'ansible/roles/desktop/files/panel-background.svg'),
          ]
          errors = []
          for a, b in pairs:
              if not os.path.exists(a):
                  errors.append(f'MISSING: {a}')
                  continue
              if not os.path.exists(b):
                  errors.append(f'MISSING: {b}')
                  continue
              if filecmp.cmp(a, b, shallow=False):
                  print(f'{os.path.basename(a)}: in sync')
              else:
                  errors.append(f'DIVERGED: {a} != {b}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All extra/ <-> ansible/roles/desktop/files/ files in sync')
          "

      - name: Log role subtask list verification
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml, os, sys
          errors = []
          tasks_dir = 'ansible/roles'
          for root, dirs, files in os.walk(tasks_dir):
              for f in files:
                  if f != 'main.yml': continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      try:
                          tasks = yaml.safe_load(fh)
                      except: continue
                  if tasks is None:
                      errors.append(f'EMPTY: {path}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All role main task files non-empty')
          "

  dry-run-playbook:
    name: dry run playbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible-core

      - name: Install collections
        run: ansible-galaxy collection install ansible.posix community.general

      - name: Install firewalld and sshd
        run: sudo apt-get install -y -qq firewalld openssh-server

      - name: Log playbook check mode run
        run: |
          ansible-playbook ansible/site.yml -i ansible/inventories/localhost/hosts.yml \
            --check --diff \
            --skip-tags desktop,devtools,packages \
            -e 'ansible_python_interpreter=/usr/bin/python3' \
             2>&1 | tail -50 || true

  validate-docs:
    name: validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nodejs
          npm install -g markdownlint-cli

      - name: Log markdown lint results
        run: |
          markdownlint --disable MD013 MD033 MD041 \
            README.md SPRINTS.md \
            docs/README.md docs/SPRINTS.md docs/INSTRUCTIONS.md || true

      - name: Log README file reference verification
        run: |
          python3 -c "
          import os, sys
          refs = [
              ('ansible/', 'ansible/ directory'),
              ('extra/kde/', 'extra/kde/ directory'),
              ('extra/kde/apply_kde.py', 'KDE apply script'),
              ('docs/SPRINTS.md', 'Sprint roadmap'),
          ]
          errors = []
          for path, desc in refs:
              if not os.path.exists(path):
                  errors.append(f'README references {desc} ({path}) but file not found')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('README file references valid')
          "

      - name: Log LICENSE file check
        run: test -f LICENSE

      - name: Log SPRINTS dot md structure verification
        run: grep -q '^# ' SPRINTS.md

  e2e-toolbox:
    name: e2e toolbox
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --user root
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies in container
        run: |
          dnf install -y -q ansible-core python3-pip python3-pyyaml
          python3 -m venv /tmp/atomik-venv
          /tmp/atomik-venv/bin/pip install --quiet pyyaml
          ansible-galaxy collection install ansible.posix community.general

      - name: Log YAML file validation
        run: |
          python3 -c "
          import yaml, os, sys
          errors = []
          skip_prefixes = ('.git/', '.github/')
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if not f.endswith('.yml'):
                      continue
                  if f.endswith('.j2'):
                      continue
                  path = os.path.join(root, f)
                  try:
                      with open(path) as fh:
                          yaml.safe_load(fh)
                  except yaml.YAMLError as e:
                      errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)
          print('All YAML files valid')
          "

      - name: Log role structure verification
        run: |
          for role in repos packages security desktop; do
            test -f "ansible/roles/$role/tasks/main.yml" || exit 1
          done

      - name: Log template compilation verification
        run: |
          python3 -c "
          import os
          templates = []
          for root, dirs, files in os.walk('ansible/roles'):
              for f in files:
                  if f.endswith('.j2'):
                      templates.append(os.path.join(root, f))
          print(f'Templates found: {len(templates)}')
          if len(templates) < 8:
              print('ERROR: expected at least 8 templates')
              exit(1)
          for t in sorted(templates):
              print(f'  {t}')
          "

      - name: Log handlers verification
        run: |
          count=$(find ansible/roles -path '*/handlers/main.yml' | wc -l)
          test "$count" -ge 2 || exit 1

      - name: Log nix configuration validation
        run: |
          python3 -c "
          import os
          nix_dir = 'extra/nix'
          assert os.path.exists(f'{nix_dir}/apply_nix.py'), 'apply_nix.py missing'
          assert os.path.exists(f'{nix_dir}/site.yml'), 'site.yml missing'
          print('Nix extra module valid')
          "

      - name: Log sysctl configuration validation
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          s = cfg.get('atomik_sysctl', {})
          assert s['fs']['file-max'] == 9223372036854775807
          assert s['kernel'].get('sched_latency_ns') == 6000000
          assert 'net' in s and 'vm' in s
          print('Sysctl config valid')
          "

      - name: Log variant configuration validation
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          for v in ['silverblue', 'kinoite', 'cosmic-atomic']:
              r = cfg.get('atomik_variant_remove', {}).get(v, [])
              i = cfg.get('atomik_variant_install', {}).get(v, [])
              assert isinstance(r, list), f'{v} remove not a list'
              assert isinstance(i, list), f'{v} install not a list'
              print(f'{v}: {len(i)} install, {len(r)} remove')
          "

      - name: Log RPM conflict validation
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          install = set(cfg.get('atomik_rpm_install', []))
          remove = set(cfg.get('atomik_rpm_remove', []))
          conflict = install & remove
          if conflict:
              print(f'CONFLICT: {conflict} in both install and remove')
              exit(1)
          print(f'RPM lists OK: {len(install)} install, {len(remove)} remove')
          "

      - name: Log KDE theme configuration validation
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          t = cfg.get('atomik_kde_theme', {}).get('kinoite', {})
          assert t.get('theme') == 'Nordic', 'theme != Nordic'
          assert t.get('colorscheme') == 'Nordic', 'colorscheme != Nordic'
          assert 'font' in t and 'icon_theme' in t and 'cursor_theme' in t
          print('KDE theme config valid')
          "

      - name: Log desktop scheduler validation
        run: |
          /tmp/atomik-venv/bin/python3 -c "
          import yaml
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          for v in ['silverblue', 'kinoite', 'cosmic-atomic']:
              services = cfg.get('atomik_desktop_scheduler_services', {}).get(v, [])
              print(f'{v}: scheduler services = {services}')
          "

      - name: Log OOMD protected services validation
        run: |
          python3 -c "
          import yaml
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          for v in ['silverblue', 'kinoite', 'cosmic-atomic']:
              prot = cfg.get('atomik_oomd_protected_services', {}).get(v, [])
              assert len(prot) > 0, f'{v}: no OOMD protected services'
              print(f'{v}: {len(prot)} OOMD protected services')
          "

      - name: Log shell script reference verification
        run: |
          python3 -c "
          import yaml, os, sys
          with open('ansible/group_vars/all.yml') as f:
              cfg = yaml.safe_load(f)
          refs = [
              ('/usr/bin/fish', cfg.get('atomik_default_shell', '')),
          ]
          for expected, value in refs:
              if expected not in str(value):
                  print(f'WARNING: expected {expected} in config')
          print('Shell references OK')
          "

      - name: Log extra modules validation
        run: |
          python3 -c "
          import os
          extras = ['business', 'codium', 'debloat', 'devtools', 'gaming', 'gnome', 'kde', 'nix', 'packages']
          errors = []
          for ext in extras:
              ext_dir = f'extra/{ext}'
              if not os.path.exists(ext_dir):
                  errors.append(f'MISSING: {ext_dir}')
                  continue
              site_yml = f'{ext_dir}/site.yml'
              py_files = [f for f in os.listdir(ext_dir) if f.endswith('.py')]
              if not os.path.exists(site_yml) and not py_files:
                  errors.append(f'MISSING: {site_yml} and no Python scripts in {ext_dir}')
              else:
                  kind = 'site.yml' if os.path.exists(site_yml) else 'python'
                  print(f'{ext}: {kind}')
          if errors:
              for e in errors:
                  print(e)
              exit(1)
          print(f'All {len(extras)} extra modules validated')
          "

      - name: Log gaming module validation
        run: |
          python3 -c "
          import yaml
          with open('extra/gaming/site.yml') as f:
              cfg = yaml.safe_load(f)
          pkgs = cfg[0]['vars']['gaming_nix_packages']
          assert 'discord' in pkgs, 'Discord missing'
          print(f'Gaming: {len(pkgs)} Nix packages configured')
          "

      - name: Log business module validation
        run: |
          python3 -c "
          import yaml
          with open('extra/business/site.yml') as f:
              cfg = yaml.safe_load(f)
          pkgs = cfg[0]['vars']['business_nix_packages']
          assert 'slack' in pkgs, 'Slack missing'
          print(f'Business: {len(pkgs)} Nix packages configured')
          "

      - name: Log debloat module validation
        run: |
          python3 -c "
          import yaml
          with open('extra/debloat/site.yml') as f:
              cfg = yaml.safe_load(f)
          packages = cfg[0]['vars']['atomik_rpm_remove']
          assert 'firefox' in packages, 'firefox missing from debloat'
          assert len(packages) >= 5, f'Expected at least 5 packages, got {len(packages)}'
          print(f'Debloat: {len(packages)} packages to remove')
          "

      - name: Log packages module validation
        run: |
          python3 -c "
          import yaml
          with open('extra/packages/site.yml') as f:
              cfg = yaml.safe_load(f)
          packages = cfg[0]['vars']['atomik_rpm_install']
          assert 'brave-origin' in packages, 'brave-origin missing'
          print(f'Packages: {len(packages)} packages to install')
          "

      - name: Validate masked services
        run: python3 tests/validate_masked_services.py

      - name: Validate tuned services
        run: python3 tests/validate_tuned_services.py

  e2e-integration:
    name: e2e integration
    runs-on: ubuntu-latest
    needs: e2e-toolbox
    steps:
      - uses: actions/checkout@v7

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible-core

      - name: Install collections
        run: ansible-galaxy collection install ansible.posix community.general

      - name: Log E2E playbook execution
        run: ansible-playbook tests/e2e.yml -i ansible/inventories/localhost/hosts.yml -c local
        env:
          ANSIBLE_LOG_PATH: /tmp/ansible.log

      - name: Log E2E extras playbook execution
        run: ansible-playbook tests/e2e_extras.yml -i ansible/inventories/localhost/hosts.yml -c local
        env:
          ANSIBLE_LOG_PATH: /tmp/ansible-extras.log

      - name: Store E2E log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ansible-e2e-log
          path: /tmp/ansible.log

  commit-lint:
    name: commit lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Log commit message subject format
        run: |
          FAILED=0
          for sha in $(git rev-list ${{ github.event.before || 'HEAD~1' }}..HEAD); do
            SUBJ=$(git log -1 --format='%s' "$sha")
            SUBJ_LINES=$(printf '%s' "$SUBJ" | wc -l)
            if [ "$SUBJ_LINES" -gt 0 ]; then
              echo "FAIL: $sha subject spans multiple lines"
              echo "  $SUBJ"
              FAILED=1
            fi
            if [ ${#SUBJ} -gt 80 ]; then
              echo "WARN: $sha subject is ${#SUBJ} chars (max 80)"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Commit subjects must be single-line"
            exit 1
          fi
          echo "All commit subjects are single-line"

      - name: Log commit sign off verification
        run: |
          FAILED=0
          for sha in $(git rev-list ${{ github.event.before || 'HEAD~1' }}..HEAD); do
            MSG=$(git log -1 --format='%B' "$sha")
            if ! echo "$MSG" | grep -q "^Signed-off-by:"; then
              echo "WARN: $sha missing Signed-off-by"
              echo "  Subject: $(git log -1 --format='%s' "$sha")"
            fi
          done
          echo "Commit sign-off check completed"
